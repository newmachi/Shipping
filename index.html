<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyShip · Ship Smarter</title>
    <!-- Tailwind via CDN + custom style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      body { background: #f9fafc; }
      .card-shadow { box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
      .transition-all { transition: all 0.2s ease; }
      .media-grid img, .media-grid video { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; }
      .track-step { display: flex; align-items: center; gap: 8px; }
      .track-line { flex: 1; height: 2px; background: #e5e7eb; margin: 0 8px; }
      .track-step.active .track-dot { background: #2563eb; border-color: #2563eb; }
      .track-step.completed .track-dot { background: #22c55e; border-color: #22c55e; }
      .track-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #d1d5db; background: white; flex-shrink: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React + ReactDOM + Babel Standalone -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      // ---------- MOCK DATA / STORE ----------
      const INITIAL_TESTIMONIALS = [
        { id: 1, author: 'Amarachi O.', role: 'Skincare brand founder', text: 'EasyShip saved my glass-bottled products! No more breakages. The “We break it, we pay it” rule is a game changer.', rating: 5 },
        { id: 2, author: 'Engr. Austin', role: 'Family head, Lagos', text: 'Sending foodstuffs to my kids abroad used to be stressful. Now I track everything live. Peace of mind.', rating: 5 },
        { id: 3, author: 'Tunde O.', role: 'E-commerce startup', text: 'Compared 250+ couriers instantly and cut shipping costs by 70%. EasyShip is incredible.', rating: 4 },
      ];

      const INITIAL_MEDIA = [
        { id: 1, type: 'image', url: 'https://picsum.photos/seed/ship1/400/300', caption: 'Our packing team' },
        { id: 2, type: 'image', url: 'https://picsum.photos/seed/ship2/400/300', caption: 'Fragile items handling' },
        { id: 3, type: 'video', url: 'https://www.w3schools.com/html/mov_bbb.mp4', caption: 'How we pack' },
        { id: 4, type: 'image', url: 'https://picsum.photos/seed/ship3/400/300', caption: 'International shipping' },
      ];

      const INITIAL_USERS = [
        { id: 1, email: 'customer@easyship.com', password: 'customer123', role: 'customer', name: 'Amara Okonkwo', promoOptIn: true },
        { id: 2, email: 'admin@easyship.com', password: 'admin123', role: 'admin', name: 'Chinasa Magnus', promoOptIn: false },
        { id: 3, email: 'jane@example.com', password: 'jane123', role: 'customer', name: 'Jane Doe', promoOptIn: true },
      ];

      const INITIAL_PRICING = {
        'Lagos→Abuja': 4500,
        'Lagos→Houston': 32000,
        'Lagos→London': 45000,
        'Abuja→Lagos': 4500,
        'Lagos→Port Harcourt': 3800,
      };

      const INITIAL_SHIPMENTS = [
        { id: 1, userId: 1, status: 'delivered', from: 'Lagos', to: 'Abuja', date: '2026-07-10', cost: 4500, approved: true, tracking: ['Order placed', 'Picked up', 'In transit', 'Out for delivery', 'Delivered'], currentStep: 4 },
        { id: 2, userId: 1, status: 'in transit', from: 'Lagos', to: 'Houston, TX', date: '2026-07-15', cost: 32000, approved: true, tracking: ['Order placed', 'Picked up', 'In transit', 'Customs clearance', 'Out for delivery'], currentStep: 2 },
        { id: 3, userId: 3, status: 'pending', from: 'Lagos', to: 'London', date: '2026-07-20', cost: 45000, approved: false, tracking: ['Order placed'], currentStep: 0 },
      ];

      // Support tickets
      const INITIAL_TICKETS = [
        { id: 1, userId: 1, subject: 'Damaged item', message: 'My package arrived broken.', status: 'open', date: '2026-07-16' },
      ];

      // ---------- App Context ----------
      const AppContext = React.createContext();

      const AppProvider = ({ children }) => {
        const [users, setUsers] = useState(INITIAL_USERS);
        const [testimonials, setTestimonials] = useState(INITIAL_TESTIMONIALS);
        const [media, setMedia] = useState(INITIAL_MEDIA);
        const [currentUser, setCurrentUser] = useState(null);
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [pricing, setPricing] = useState(INITIAL_PRICING);
        const [shipments, setShipments] = useState(INITIAL_SHIPMENTS);
        const [tickets, setTickets] = useState(INITIAL_TICKETS);
        const [payments, setPayments] = useState([]);

        const login = (email, password) => {
          const user = users.find(u => u.email === email && u.password === password);
          if (user) {
            setCurrentUser(user);
            setIsAuthenticated(true);
            return true;
          }
          return false;
        };

        const logout = () => {
          setCurrentUser(null);
          setIsAuthenticated(false);
        };

        const register = (email, password, name, promoOptIn) => {
          const exists = users.find(u => u.email === email);
          if (exists) return false;
          const newUser = { id: Date.now(), email, password, role: 'customer', name, promoOptIn };
          setUsers([...users, newUser]);
          return true;
        };

        // Admin functions
        const deleteUser = (id) => setUsers(users.filter(u => u.id !== id));
        const updateUser = (id, data) => {
          setUsers(users.map(u => u.id === id ? { ...u, ...data } : u));
        };

        const addTestimonial = (testimonial) => {
          setTestimonials([...testimonials, { id: Date.now(), ...testimonial }]);
        };
        const deleteTestimonial = (id) => {
          setTestimonials(testimonials.filter(t => t.id !== id));
        };

        const addMedia = (item) => setMedia([...media, { id: Date.now(), ...item }]);
        const deleteMedia = (id) => setMedia(media.filter(m => m.id !== id));

        const updatePricing = (route, price) => {
          setPricing({ ...pricing, [route]: price });
        };

        const getUserShipments = (userId) => shipments.filter(s => s.userId === userId);
        const addShipment = (shipment) => {
          const newShipment = { 
            id: Date.now(), 
            ...shipment, 
            tracking: ['Order placed'], 
            currentStep: 0,
            status: 'pending',
            approved: false 
          };
          setShipments([...shipments, newShipment]);
          return newShipment;
        };
        const approveShipment = (id) => {
          setShipments(shipments.map(s => s.id === id ? { ...s, approved: true, status: 'in transit', tracking: ['Order placed', 'Picked up', 'In transit'], currentStep: 2 } : s));
        };
        const deleteShipment = (id) => {
          setShipments(shipments.filter(s => s.id !== id));
        };
        const updateShipmentTracking = (id, step) => {
          setShipments(shipments.map(s => s.id === id ? { ...s, currentStep: step } : s));
        };

        // Payments
        const addPayment = (payment) => {
          const newPayment = { id: Date.now(), ...payment, date: new Date().toISOString().split('T')[0], status: 'completed' };
          setPayments([...payments, newPayment]);
          return newPayment;
        };

        // Support tickets
        const addTicket = (ticket) => {
          const newTicket = { id: Date.now(), ...ticket, date: new Date().toISOString().split('T')[0], status: 'open' };
          setTickets([...tickets, newTicket]);
          return newTicket;
        };
        const closeTicket = (id) => {
          setTickets(tickets.map(t => t.id === id ? { ...t, status: 'closed' } : t));
        };

        const value = {
          users, setUsers,
          testimonials, setTestimonials,
          media, setMedia,
          currentUser, setCurrentUser,
          isAuthenticated, setIsAuthenticated,
          login, logout, register,
          addTestimonial, deleteTestimonial,
          addMedia, deleteMedia,
          pricing, updatePricing,
          shipments, setShipments,
          getUserShipments, addShipment, approveShipment, deleteShipment, updateShipmentTracking,
          deleteUser, updateUser,
          payments, addPayment,
          tickets, addTicket, closeTicket,
        };
        return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
      };

      const useApp = () => React.useContext(AppContext);

      // ---------- COMPONENTS ----------

      // Navigation
      const NavBar = () => {
        const { isAuthenticated, currentUser, logout } = useApp();
        const [showSupport, setShowSupport] = useState(false);
        return (
          <nav className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-30 shadow-sm flex-wrap gap-2">
            <div className="flex items-center gap-2">
              <i className="fas fa-ship text-2xl text-blue-600"></i>
              <span className="text-xl font-bold text-gray-800">EasyShip</span>
              <span className="text-xs text-gray-500 ml-1 hidden sm:inline">Ship Smarter.</span>
            </div>
            <div className="flex items-center gap-4">
              {!isAuthenticated ? (
                <>
                  <a href="#login" className="text-sm font-medium text-blue-600 hover:text-blue-800">Log in</a>
                  <a href="#register" className="text-sm bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700">Sign up</a>
                </>
              ) : (
                <div className="flex items-center gap-3 flex-wrap">
                  <button onClick={() => setShowSupport(!showSupport)} className="text-sm text-gray-600 hover:text-blue-600 flex items-center gap-1">
                    <i className="fas fa-headset"></i> Support
                  </button>
                  <span className="text-sm text-gray-700 hidden sm:block">{currentUser?.name}</span>
                  <span className="text-xs bg-gray-200 px-2 py-0.5 rounded-full text-gray-600">{currentUser?.role}</span>
                  <button onClick={logout} className="text-sm text-red-500 hover:text-red-700 flex items-center gap-1"><i className="fas fa-sign-out-alt"></i> Logout</button>
                </div>
              )}
            </div>
            {showSupport && isAuthenticated && <SupportModal onClose={() => setShowSupport(false)} />}
          </nav>
        );
      };

      // Support Modal
      const SupportModal = ({ onClose }) => {
        const { currentUser, addTicket } = useApp();
        const [subject, setSubject] = useState('');
        const [message, setMessage] = useState('');
        const [submitted, setSubmitted] = useState(false);

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!subject || !message) return;
          addTicket({ userId: currentUser.id, subject, message });
          setSubmitted(true);
          setTimeout(() => { setSubmitted(false); onClose(); }, 2000);
        };

        return (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
              <div className="flex justify-between items-center mb-4">
                <h3 className="text-xl font-bold">Support Center</h3>
                <button onClick={onClose} className="text-gray-500 hover:text-gray-700"><i className="fas fa-times"></i></button>
              </div>
              {submitted ? (
                <div className="text-center py-8 text-green-600"><i className="fas fa-check-circle text-4xl mb-2"></i><p>Ticket submitted! We'll get back to you soon.</p></div>
              ) : (
                <>
                  <div className="mb-4 text-sm text-gray-600">
                    <p><i className="fas fa-phone mr-2"></i> +234 800 EASYSHIP</p>
                    <p><i className="fas fa-envelope mr-2"></i> support@easyship.com</p>
                    <p><i className="fas fa-clock mr-2"></i> Mon-Fri 8AM - 6PM</p>
                  </div>
                  <form onSubmit={handleSubmit} className="space-y-3">
                    <input type="text" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="Subject" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" required />
                    <textarea value={message} onChange={e=>setMessage(e.target.value)} placeholder="Describe your issue..." className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" rows="4" required />
                    <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-xl font-medium hover:bg-blue-700">Submit Ticket</button>
                  </form>
                </>
              )}
            </div>
          </div>
        );
      };

      // Media Showcase
      const MediaShowcase = () => {
        const { media } = useApp();
        return (
          <section className="mt-8">
            <h2 className="text-2xl font-bold text-gray-800 mb-4 text-center">📸 Behind the Scenes</h2>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 media-grid">
              {media.map(item => (
                <div key={item.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                  {item.type === 'image' ? (
                    <img src={item.url} alt={item.caption} className="w-full h-40 object-cover" />
                  ) : (
                    <video src={item.url} controls className="w-full h-40 object-cover" />
                  )}
                  <p className="text-xs text-gray-500 p-2 text-center">{item.caption}</p>
                </div>
              ))}
            </div>
          </section>
        );
      };

      // Home
      const Home = ({ setView }) => {
        const { testimonials } = useApp();
        return (
          <div className="max-w-6xl mx-auto px-4 py-8">
            <section className="text-center my-10">
              <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 leading-tight">Ship Smarter. <span className="text-blue-600">Grow Faster.</span></h1>
              <p className="text-lg text-gray-600 max-w-2xl mx-auto mt-4">EasyShip handles local drop-offs to international freight. Insured, tracked, and built for high-value goods.</p>
              <div className="mt-6 flex flex-wrap justify-center gap-4">
                <button onClick={() => setView('register')} className="bg-blue-600 text-white px-8 py-3 rounded-full font-medium hover:bg-blue-700 shadow-lg">Get Started</button>
                <button className="border border-gray-300 px-8 py-3 rounded-full font-medium hover:bg-gray-50">Learn More</button>
              </div>
            </section>

            <MediaShowcase />

            <section className="mt-16">
              <h2 className="text-2xl font-bold text-gray-800 mb-6 text-center">What Our Customers Say</h2>
              <div className="grid md:grid-cols-3 gap-6">
                {testimonials.map(t => (
                  <div key={t.id} className="bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                    <div className="flex text-yellow-400 text-sm mb-1">{'★'.repeat(t.rating)}{'☆'.repeat(5-t.rating)}</div>
                    <p className="text-gray-700 italic">“{t.text}”</p>
                    <div className="mt-4 font-semibold text-gray-800">{t.author}</div>
                    <div className="text-xs text-gray-500">{t.role}</div>
                  </div>
                ))}
              </div>
            </section>

            <section className="grid md:grid-cols-3 gap-4 mt-16 bg-blue-50 p-8 rounded-3xl">
              <div className="text-center"><i className="fas fa-shield-alt text-3xl text-blue-600"></i><p className="font-semibold mt-2">We break it, we pay it</p></div>
              <div className="text-center"><i className="fas fa-globe text-3xl text-blue-600"></i><p className="font-semibold mt-2">250+ couriers compared</p></div>
              <div className="text-center"><i className="fas fa-tag text-3xl text-blue-600"></i><p className="font-semibold mt-2">Save up to 70%</p></div>
            </section>
          </div>
        );
      };

      // AuthForm with promo opt-in
      const AuthForm = ({ type, setView }) => {
        const { login, register } = useApp();
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [name, setName] = useState('');
        const [promoOptIn, setPromoOptIn] = useState(true);
        const [error, setError] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          setError('');
          if (type === 'login') {
            const success = login(email, password);
            if (!success) setError('Invalid credentials.');
            else setView('dashboard');
          } else {
            if (!name.trim()) { setError('Full name required'); return; }
            const success = register(email, password, name, promoOptIn);
            if (!success) setError('Email already registered.');
            else { setView('dashboard'); }
          }
        };

        return (
          <div className="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-lg mt-10 border border-gray-100">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">{type === 'login' ? 'Welcome Back' : 'Create Account'}</h2>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4">{error}</div>}
            <form onSubmit={handleSubmit} className="space-y-4">
              {type === 'register' && (
                <>
                  <div>
                    <label className="block text-sm font-medium text-gray-700">Full Name</label>
                    <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mt-1" placeholder="Amara Okonkwo" required />
                  </div>
                  <div className="flex items-center gap-2">
                    <input type="checkbox" id="promoOptIn" checked={promoOptIn} onChange={e=>setPromoOptIn(e.target.checked)} className="w-4 h-4 text-blue-600" />
                    <label htmlFor="promoOptIn" className="text-sm text-gray-600">I agree to receive promotional emails and updates</label>
                  </div>
                </>
              )}
              <div>
                <label className="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mt-1" placeholder="you@example.com" required />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mt-1" placeholder="••••••••" required />
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition">
                {type === 'login' ? 'Log in' : 'Create account'}
              </button>
            </form>
            <p className="text-sm text-gray-500 mt-4 text-center">
              {type === 'login' ? "Don't have an account? " : "Already registered? "}
              <button onClick={() => setView(type === 'login' ? 'register' : 'login')} className="text-blue-600 hover:underline">
                {type === 'login' ? 'Sign up' : 'Log in'}
              </button>
            </p>
          </div>
        );
      };

      // Tracking component
      const TrackingSteps = ({ shipment }) => {
        const steps = shipment.tracking || ['Order placed', 'Picked up', 'In transit', 'Out for delivery', 'Delivered'];
        const currentStep = shipment.currentStep || 0;
        return (
          <div className="mt-2">
            <div className="flex items-center gap-1 text-xs">
              {steps.map((step, idx) => (
                <React.Fragment key={idx}>
                  <div className={`track-step ${idx <= currentStep ? 'completed' : ''} flex items-center`}>
                    <div className="track-dot"></div>
                    <span className="text-xs ml-1 hidden sm:inline">{step}</span>
                  </div>
                  {idx < steps.length - 1 && <div className="track-line"></div>}
                </React.Fragment>
              ))}
            </div>
            <div className="text-xs text-gray-500 mt-1">Step {currentStep + 1} of {steps.length}: {steps[currentStep] || 'Order placed'}</div>
          </div>
        );
      };

      // Customer Dashboard with payment and tracking
      const CustomerDashboard = () => {
        const { currentUser, getUserShipments, addShipment, pricing, addPayment, updateShipmentTracking } = useApp();
        const [shipments, setShipmentsState] = useState([]);
        const [newShipment, setNewShipment] = useState({ from: '', to: '', cost: '' });
        const [showPayment, setShowPayment] = useState(null);

        useEffect(() => {
          if (currentUser) {
            setShipmentsState(getUserShipments(currentUser.id));
          }
        }, [currentUser]);

        const handleAddShipment = (e) => {
          e.preventDefault();
          if (!newShipment.from || !newShipment.to) return;
          const routeKey = `${newShipment.from}→${newShipment.to}`;
          const estimatedCost = pricing[routeKey] || parseFloat(newShipment.cost) || 5000;
          const shipment = {
            userId: currentUser.id,
            from: newShipment.from,
            to: newShipment.to,
            cost: estimatedCost,
          };
          const created = addShipment(shipment);
          setShipmentsState([...shipments, created]);
          setNewShipment({ from: '', to: '', cost: '' });
          // Simulate payment popup
          setShowPayment({ shipmentId: created.id, amount: estimatedCost });
        };

        const handlePayment = (shipmentId, amount) => {
          addPayment({ userId: currentUser.id, shipmentId, amount });
          setShowPayment(null);
          // Update tracking after payment
          updateShipmentTracking(shipmentId, 1);
          setShipmentsState(shipments.map(s => s.id === shipmentId ? { ...s, status: 'in transit', tracking: ['Order placed', 'Picked up', 'In transit'], currentStep: 1 } : s));
        };

        return (
          <div className="max-w-5xl mx-auto px-4 py-8">
            <h2 className="text-3xl font-bold text-gray-800">👋 Welcome, {currentUser?.name}</h2>
            <p className="text-gray-500 mb-6">Your shipping dashboard</p>

            <div className="grid md:grid-cols-2 gap-6">
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-semibold text-gray-700 flex items-center gap-2"><i className="fas fa-box text-blue-500"></i> Recent shipments</h3>
                {shipments.length === 0 ? (
                  <p className="text-gray-400 text-sm mt-3">No shipments yet.</p>
                ) : (
                  <ul className="mt-3 space-y-4 max-h-80 overflow-y-auto">
                    {shipments.map((s) => (
                      <li key={s.id} className="border-b border-gray-50 pb-3">
                        <div className="flex justify-between items-start">
                          <div>
                            <span className="font-medium text-gray-800">{s.from} → {s.to}</span>
                            <span className="text-xs text-gray-400 ml-2">{s.date}</span>
                            <span className={`ml-3 text-xs px-2 py-0.5 rounded-full ${s.status === 'delivered' ? 'bg-green-100 text-green-700' : s.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-blue-100 text-blue-700'}`}>{s.status}</span>
                            {!s.approved && <span className="ml-2 text-xs text-red-400">(awaiting approval)</span>}
                          </div>
                          <span className="text-sm font-medium">₦{s.cost.toLocaleString()}</span>
                        </div>
                        {s.approved && <TrackingSteps shipment={s} />}
                        {s.status === 'pending' && !s.approved && (
                          <button onClick={() => setShowPayment({ shipmentId: s.id, amount: s.cost })} className="mt-2 bg-green-600 text-white text-xs px-3 py-1 rounded-full hover:bg-green-700">Pay now</button>
                        )}
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-semibold text-gray-700 flex items-center gap-2"><i className="fas fa-plus-circle text-blue-500"></i> Book new shipment</h3>
                <form onSubmit={handleAddShipment} className="mt-3 space-y-3">
                  <input type="text" value={newShipment.from} onChange={e=>setNewShipment({...newShipment, from:e.target.value})} placeholder="From (city)" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" required />
                  <input type="text" value={newShipment.to} onChange={e=>setNewShipment({...newShipment, to:e.target.value})} placeholder="To (city/country)" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" required />
                  <input type="number" value={newShipment.cost} onChange={e=>setNewShipment({...newShipment, cost:e.target.value})} placeholder="Est. cost (₦) - optional" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" />
                  <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-xl font-medium hover:bg-blue-700">Request shipment</button>
                </form>
                <p className="text-xs text-gray-400 mt-2"><i className="fas fa-shield-alt text-blue-400"></i> “We break it, we pay it” protection included.</p>
              </div>
            </div>

            <div className="mt-6 grid grid-cols-3 gap-4 bg-white p-4 rounded-2xl border border-gray-100">
              <div><span className="text-xs text-gray-400">Total</span><div className="text-xl font-bold">{shipments.length}</div></div>
              <div><span className="text-xs text-gray-400">Delivered</span><div className="text-xl font-bold">{shipments.filter(s=>s.status==='delivered').length}</div></div>
              <div><span className="text-xs text-gray-400">In transit</span><div className="text-xl font-bold">{shipments.filter(s=>s.status==='in transit').length}</div></div>
            </div>

            {/* Payment Modal */}
            {showPayment && (
              <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-2xl max-w-md w-full p-6">
                  <h3 className="text-xl font-bold mb-4">Complete Payment</h3>
                  <p className="text-gray-600 mb-2">Shipment #{showPayment.shipmentId}</p>
                  <p className="text-2xl font-bold text-blue-600 mb-4">₦{showPayment.amount.toLocaleString()}</p>
                  <div className="space-y-2 mb-4">
                    <div className="border rounded-xl p-3 flex items-center gap-3 hover:border-blue-400 cursor-pointer">
                      <i className="fas fa-credit-card text-blue-600 text-xl"></i>
                      <span>Pay with Card</span>
                    </div>
                    <div className="border rounded-xl p-3 flex items-center gap-3 hover:border-blue-400 cursor-pointer">
                      <i className="fas fa-mobile-alt text-blue-600 text-xl"></i>
                      <span>Pay with USSD</span>
                    </div>
                    <div className="border rounded-xl p-3 flex items-center gap-3 hover:border-blue-400 cursor-pointer">
                      <i className="fas fa-wallet text-blue-600 text-xl"></i>
                      <span>Pay with Wallet</span>
                    </div>
                  </div>
                  <div className="flex gap-3">
                    <button onClick={() => handlePayment(showPayment.shipmentId, showPayment.amount)} className="flex-1 bg-blue-600 text-white py-2 rounded-xl font-medium hover:bg-blue-700">Pay Now</button>
                    <button onClick={() => setShowPayment(null)} className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-xl font-medium hover:bg-gray-300">Cancel</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      // Admin Dashboard (same as before but with X branding)
      const AdminDashboard = () => {
        const { users, testimonials, media, shipments, pricing, 
                deleteUser, updateUser, addTestimonial, deleteTestimonial,
                addMedia, deleteMedia, updatePricing, approveShipment, deleteShipment } = useApp();
        const [newTest, setNewTest] = useState({ author: '', role: '', text: '', rating: 5 });
        const [newMedia, setNewMedia] = useState({ type: 'image', url: '', caption: '' });
        const [editingUser, setEditingUser] = useState(null);
        const [priceRoute, setPriceRoute] = useState('');
        const [priceValue, setPriceValue] = useState('');

        const handleAddTest = (e) => {
          e.preventDefault();
          if (!newTest.author || !newTest.text) return;
          addTestimonial(newTest);
          setNewTest({ author: '', role: '', text: '', rating: 5 });
        };

        const handleAddMedia = (e) => {
          e.preventDefault();
          if (!newMedia.url) return;
          addMedia(newMedia);
          setNewMedia({ type: 'image', url: '', caption: '' });
        };

        const handleUpdatePrice = (e) => {
          e.preventDefault();
          if (!priceRoute || !priceValue) return;
          updatePricing(priceRoute, parseFloat(priceValue));
          setPriceRoute('');
          setPriceValue('');
        };

        return (
          <div className="max-w-6xl mx-auto px-4 py-8">
            <h2 className="text-3xl font-bold text-gray-800">⚙️ Admin Dashboard</h2>
            <p className="text-gray-500 mb-6">Full control: customers, shipments, pricing, testimonials & media</p>

            {/* Customer Management */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
              <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-users text-blue-500"></i> Customer Management</h3>
              <div className="overflow-x-auto mt-3">
                <table className="w-full text-sm">
                  <thead><tr className="text-left border-b"><th>Name</th><th>Email</th><th>Promo</th><th>Role</th><th>Actions</th></tr></thead>
                  <tbody>
                    {users.map(u => (
                      <tr key={u.id} className="border-b border-gray-50">
                        <td className="py-2">{u.name}</td>
                        <td>{u.email}</td>
                        <td>{u.promoOptIn ? '✅' : '❌'}</td>
                        <td><span className="text-xs bg-gray-100 px-2 rounded-full">{u.role}</span></td>
                        <td className="flex gap-2">
                          <button onClick={() => setEditingUser(u)} className="text-blue-500 hover:text-blue-700 text-xs"><i className="fas fa-edit"></i></button>
                          {u.role !== 'admin' && <button onClick={() => deleteUser(u.id)} className="text-red-400 hover:text-red-600 text-xs"><i className="fas fa-trash"></i></button>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {editingUser && (
                <div className="mt-4 p-4 bg-gray-50 rounded-xl">
                  <h4 className="font-medium">Edit User: {editingUser.name}</h4>
                  <div className="flex gap-2 mt-2 flex-wrap">
                    <input type="text" value={editingUser.name} onChange={e=>setEditingUser({...editingUser, name:e.target.value})} className="border rounded px-2 py-1 text-sm" />
                    <input type="email" value={editingUser.email} onChange={e=>setEditingUser({...editingUser, email:e.target.value})} className="border rounded px-2 py-1 text-sm" />
                    <label className="flex items-center gap-1 text-sm"><input type="checkbox" checked={editingUser.promoOptIn} onChange={e=>setEditingUser({...editingUser, promoOptIn:e.target.checked})} /> Promo</label>
                    <button onClick={() => { updateUser(editingUser.id, { name: editingUser.name, email: editingUser.email, promoOptIn: editingUser.promoOptIn }); setEditingUser(null); }} className="bg-blue-600 text-white px-3 py-1 rounded text-sm">Save</button>
                    <button onClick={() => setEditingUser(null)} className="bg-gray-300 px-3 py-1 rounded text-sm">Cancel</button>
                  </div>
                </div>
              )}
            </div>

            {/* Shipment Management */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
              <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-truck text-blue-500"></i> Shipment Management</h3>
              <div className="overflow-x-auto mt-3">
                <table className="w-full text-sm">
                  <thead><tr className="text-left border-b"><th>From → To</th><th>Cost</th><th>Status</th><th>Approved</th><th>Actions</th></tr></thead>
                  <tbody>
                    {shipments.map(s => (
                      <tr key={s.id} className="border-b border-gray-50">
                        <td className="py-2">{s.from} → {s.to}</td>
                        <td>₦{s.cost.toLocaleString()}</td>
                        <td>{s.status}</td>
                        <td>{s.approved ? '✅' : '⏳'}</td>
                        <td className="flex gap-2">
                          {!s.approved && <button onClick={() => approveShipment(s.id)} className="bg-green-500 text-white px-2 py-0.5 rounded text-xs">Approve</button>}
                          <button onClick={() => deleteShipment(s.id)} className="text-red-400 hover:text-red-600 text-xs"><i className="fas fa-trash"></i></button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Pricing Management */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
              <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-tags text-blue-500"></i> Route Pricing</h3>
              <div className="grid md:grid-cols-2 gap-4 mt-3">
                <div>
                  <h4 className="text-sm font-medium">Current prices</h4>
                  <ul className="text-sm space-y-1 mt-1">
                    {Object.entries(pricing).map(([route, price]) => (
                      <li key={route} className="flex justify-between border-b border-gray-50 py-1"><span>{route}</span><span>₦{price.toLocaleString()}</span></li>
                    ))}
                  </ul>
                </div>
                <div>
                  <h4 className="text-sm font-medium">Update or add route</h4>
                  <form onSubmit={handleUpdatePrice} className="flex flex-col gap-2 mt-1">
                    <input type="text" value={priceRoute} onChange={e=>setPriceRoute(e.target.value)} placeholder="e.g. Lagos→Abuja" className="border rounded px-3 py-1 text-sm" />
                    <input type="number" value={priceValue} onChange={e=>setPriceValue(e.target.value)} placeholder="Price (₦)" className="border rounded px-3 py-1 text-sm" />
                    <button type="submit" className="bg-blue-600 text-white px-4 py-1 rounded text-sm">Update price</button>
                  </form>
                </div>
              </div>
            </div>

            {/* Testimonial Manager */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
              <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-quote-right text-blue-500"></i> Testimonials</h3>
              <ul className="mt-3 space-y-3 max-h-60 overflow-y-auto">
                {testimonials.map(t => (
                  <li key={t.id} className="border-b border-gray-50 pb-2 flex justify-between items-start">
                    <div><span className="font-medium">{t.author}</span> <span className="text-xs text-gray-400">{t.role}</span><p className="text-sm text-gray-600">“{t.text}”</p></div>
                    <button onClick={()=>deleteTestimonial(t.id)} className="text-red-400 hover:text-red-600 text-sm"><i className="fas fa-trash"></i></button>
                  </li>
                ))}
              </ul>
              <form onSubmit={handleAddTest} className="mt-4 space-y-2">
                <input type="text" value={newTest.author} onChange={e=>setNewTest({...newTest, author:e.target.value})} placeholder="Author name" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                <input type="text" value={newTest.role} onChange={e=>setNewTest({...newTest, role:e.target.value})} placeholder="Role" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                <textarea value={newTest.text} onChange={e=>setNewTest({...newTest, text:e.target.value})} placeholder="Testimonial text" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" rows="2" />
                <div className="flex items-center gap-2">
                  <span className="text-sm">Rating:</span>
                  <select value={newTest.rating} onChange={e=>setNewTest({...newTest, rating:parseInt(e.target.value)})} className="border border-gray-200 rounded-lg px-2 py-1">
                    {[1,2,3,4,5].map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
                <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-blue-700">Add testimonial</button>
              </form>
            </div>

            {/* Media Manager */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-images text-blue-500"></i> Media Showcase</h3>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-2 mt-3">
                {media.map(m => (
                  <div key={m.id} className="relative group">
                    {m.type === 'image' ? <img src={m.url} alt={m.caption} className="w-full h-20 object-cover rounded" /> : <video src={m.url} className="w-full h-20 object-cover rounded" />}
                    <button onClick={()=>deleteMedia(m.id)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition">×</button>
                    <p className="text-xs text-gray-500 text-center truncate">{m.caption}</p>
                  </div>
                ))}
              </div>
              <form onSubmit={handleAddMedia} className="mt-4 flex flex-wrap gap-2">
                <select value={newMedia.type} onChange={e=>setNewMedia({...newMedia, type:e.target.value})} className="border rounded px-2 py-1 text-sm">
                  <option value="image">Image</option>
                  <option value="video">Video</option>
                </select>
                <input type="text" value={newMedia.url} onChange={e=>setNewMedia({...newMedia, url:e.target.value})} placeholder="Media URL" className="border rounded px-3 py-1 text-sm flex-1" />
                <input type="text" value={newMedia.caption} onChange={e=>setNewMedia({...newMedia, caption:e.target.value})} placeholder="Caption" className="border rounded px-3 py-1 text-sm flex-1" />
                <button type="submit" className="bg-blue-600 text-white px-4 py-1 rounded text-sm">Add</button>
              </form>
            </div>
          </div>
        );
      };

      // Footer with X instead of Twitter
      const Footer = () => (
        <footer className="bg-white border-t border-gray-200 py-6 mt-12">
          <div className="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div className="text-sm text-gray-500">© 2026 EasyShip · Ship Smarter. Grow Faster.</div>
            <div className="flex gap-4 text-xl text-gray-600">
              <a href="#" className="hover:text-green-600"><i className="fab fa-whatsapp"></i></a>
              <a href="#" className="hover:text-black"><i className="fab fa-x-twitter"></i></a>
              <a href="#" className="hover:text-blue-700"><i className="fab fa-facebook"></i></a>
              <a href="#" className="hover:text-pink-600"><i className="fab fa-instagram"></i></a>
            </div>
          </div>
        </footer>
      );

      // Main App Router
      const App = () => {
        const { isAuthenticated, currentUser } = useApp();
        const [view, setView] = useState('home');

        useEffect(() => {
          if (isAuthenticated) setView('dashboard');
          else setView('home');
        }, [isAuthenticated]);

        const renderView = () => {
          if (!isAuthenticated) {
            if (view === 'login') return <AuthForm type="login" setView={setView} />;
            if (view === 'register') return <AuthForm type="register" setView={setView} />;
            return <Home setView={setView} />;
          } else {
            return currentUser?.role === 'admin' ? <AdminDashboard /> : <CustomerDashboard />;
          }
        };

        return (
          <div className="min-h-screen bg-gray-50/50 flex flex-col">
            <NavBar />
            <main className="flex-1 pt-4 pb-12">{renderView()}</main>
            <Footer />
          </div>
        );
      };

      const Root = () => (
        <AppProvider>
          <App />
        </AppProvider>
      );

      ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
    </script>
  </body>
</html>
