<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyShip · Ship Smarter</title>
    <!-- Tailwind via CDN + custom style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
      body { background: #f9fafc; }
      .card-shadow { box-shadow: 0 8px 20px rgba(0,0,0,0.02); }
      .transition-all { transition: all 0.2s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React + ReactDOM + Babel Standalone -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      // ---------- MOCK DATA / STORE ----------
      const INITIAL_TESTIMONIALS = [
        { id: 1, author: 'Amarachi O.', role: 'Skincare brand founder', text: 'EasyShip saved my glass-bottled products! No more breakages. The “We break it, we pay it” rule is a game changer.', rating: 5 },
        { id: 2, author: 'Engr. Austin', role: 'Family head, Lagos', text: 'Sending foodstuffs to my kids abroad used to be stressful. Now I track everything live. Peace of mind.', rating: 5 },
        { id: 3, author: 'Tunde O.', role: 'E-commerce startup', text: 'Compared 250+ couriers instantly and cut shipping costs by 70%. EasyShip is incredible.', rating: 4 },
      ];

      // initial users: demo customer & admin
      const INITIAL_USERS = [
        { id: 1, email: 'customer@easyship.com', password: 'customer123', role: 'customer', name: 'Amara Okonkwo' },
        { id: 2, email: 'admin@easyship.com', password: 'admin123', role: 'admin', name: 'Chinasa Magnus' },
      ];

      // ---------- App Context ----------
      const AppContext = React.createContext();

      const AppProvider = ({ children }) => {
        const [users, setUsers] = useState(INITIAL_USERS);
        const [testimonials, setTestimonials] = useState(INITIAL_TESTIMONIALS);
        const [currentUser, setCurrentUser] = useState(null);
        const [isAuthenticated, setIsAuthenticated] = useState(false);
        const [shipments, setShipments] = useState([
          { id: 1, userId: 1, status: 'delivered', from: 'Lagos', to: 'Abuja', date: '2026-07-10', cost: 4500 },
          { id: 2, userId: 1, status: 'in transit', from: 'Lagos', to: 'Houston, TX', date: '2026-07-15', cost: 32000 },
        ]);

        const login = (email, password) => {
          const user = users.find(u => u.email === email && u.password === password);
          if (user) {
            setCurrentUser(user);
            setIsAuthenticated(true);
            return true;
          }
          return false;
        };

        const logout = () => {
          setCurrentUser(null);
          setIsAuthenticated(false);
        };

        const register = (email, password, name) => {
          const exists = users.find(u => u.email === email);
          if (exists) return false;
          const newUser = { id: Date.now(), email, password, role: 'customer', name };
          setUsers([...users, newUser]);
          return true;
        };

        // admin functions
        const addTestimonial = (testimonial) => {
          setTestimonials([...testimonials, { id: Date.now(), ...testimonial }]);
        };
        const deleteTestimonial = (id) => {
          setTestimonials(testimonials.filter(t => t.id !== id));
        };

        // customer shipments
        const getUserShipments = (userId) => shipments.filter(s => s.userId === userId);
        const addShipment = (shipment) => {
          setShipments([...shipments, { id: Date.now(), ...shipment }]);
        };

        const value = {
          users, setUsers,
          testimonials, setTestimonials,
          currentUser, setCurrentUser,
          isAuthenticated, setIsAuthenticated,
          login, logout, register,
          addTestimonial, deleteTestimonial,
          shipments, setShipments,
          getUserShipments, addShipment,
        };
        return <AppContext.Provider value={value}>{children}</AppContext.Provider>;
      };

      // ---------- CUSTOM HOOK ----------
      const useApp = () => React.useContext(AppContext);

      // ---------- COMPONENTS ----------

      // Navigation
      const NavBar = () => {
        const { isAuthenticated, currentUser, logout } = useApp();
        return (
          <nav className="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-30 shadow-sm">
            <div className="flex items-center gap-2">
              <i className="fas fa-ship text-2xl text-blue-600"></i>
              <span className="text-xl font-bold text-gray-800">EasyShip</span>
              <span className="text-xs text-gray-500 ml-1 hidden sm:inline">Ship Smarter.</span>
            </div>
            <div className="flex items-center gap-4">
              {!isAuthenticated ? (
                <>
                  <a href="#login" className="text-sm font-medium text-blue-600 hover:text-blue-800">Log in</a>
                  <a href="#register" className="text-sm bg-blue-600 text-white px-4 py-2 rounded-full hover:bg-blue-700">Sign up</a>
                </>
              ) : (
                <div className="flex items-center gap-3">
                  <span className="text-sm text-gray-700 hidden sm:block">{currentUser?.name}</span>
                  <span className="text-xs bg-gray-200 px-2 py-0.5 rounded-full text-gray-600">{currentUser?.role}</span>
                  <button onClick={logout} className="text-sm text-red-500 hover:text-red-700 flex items-center gap-1"><i className="fas fa-sign-out-alt"></i> Logout</button>
                </div>
              )}
            </div>
          </nav>
        );
      };

      // Public Home (includes testimonials)
      const Home = ({ setView }) => {
        const { testimonials } = useApp();
        return (
          <div className="max-w-6xl mx-auto px-4 py-8">
            {/* Hero */}
            <section className="text-center my-10">
              <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 leading-tight">Ship Smarter. <span className="text-blue-600">Grow Faster.</span></h1>
              <p className="text-lg text-gray-600 max-w-2xl mx-auto mt-4">EasyShip handles local drop-offs to international freight. Insured, tracked, and built for high-value goods.</p>
              <div className="mt-6 flex flex-wrap justify-center gap-4">
                <button onClick={() => setView('register')} className="bg-blue-600 text-white px-8 py-3 rounded-full font-medium hover:bg-blue-700 shadow-lg">Get Started</button>
                <button className="border border-gray-300 px-8 py-3 rounded-full font-medium hover:bg-gray-50">Learn More</button>
              </div>
            </section>

            {/* Testimonials */}
            <section className="mt-16">
              <h2 className="text-2xl font-bold text-gray-800 mb-6 text-center">What Our Customers Say</h2>
              <div className="grid md:grid-cols-3 gap-6">
                {testimonials.map(t => (
                  <div key={t.id} className="bg-white p-6 rounded-2xl card-shadow border border-gray-100">
                    <div className="flex text-yellow-400 text-sm mb-1">{'★'.repeat(t.rating)}{'☆'.repeat(5-t.rating)}</div>
                    <p className="text-gray-700 italic">“{t.text}”</p>
                    <div className="mt-4 font-semibold text-gray-800">{t.author}</div>
                    <div className="text-xs text-gray-500">{t.role}</div>
                  </div>
                ))}
              </div>
            </section>

            {/* quick value props */}
            <section className="grid md:grid-cols-3 gap-4 mt-16 bg-blue-50 p-8 rounded-3xl">
              <div className="text-center"><i className="fas fa-shield-alt text-3xl text-blue-600"></i><p className="font-semibold mt-2">We break it, we pay it</p></div>
              <div className="text-center"><i className="fas fa-globe text-3xl text-blue-600"></i><p className="font-semibold mt-2">250+ couriers compared</p></div>
              <div className="text-center"><i className="fas fa-tag text-3xl text-blue-600"></i><p className="font-semibold mt-2">Save up to 70%</p></div>
            </section>
          </div>
        );
      };

      // Login / Register forms
      const AuthForm = ({ type, setView }) => {
        const { login, register } = useApp();
        const [email, setEmail] = useState('');
        const [password, setPassword] = useState('');
        const [name, setName] = useState('');
        const [error, setError] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          setError('');
          if (type === 'login') {
            const success = login(email, password);
            if (!success) setError('Invalid credentials. Try admin@easyship.com / admin123');
            else setView('dashboard');
          } else {
            if (!name.trim()) { setError('Full name required'); return; }
            const success = register(email, password, name);
            if (!success) setError('Email already registered.');
            else { setView('dashboard'); }
          }
        };

        return (
          <div className="max-w-md mx-auto bg-white p-8 rounded-3xl shadow-lg mt-10 border border-gray-100">
            <h2 className="text-2xl font-bold text-gray-800 mb-6">{type === 'login' ? 'Welcome Back' : 'Create Account'}</h2>
            {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4">{error}</div>}
            <form onSubmit={handleSubmit} className="space-y-4">
              {type === 'register' && (
                <div>
                  <label className="block text-sm font-medium text-gray-700">Full Name</label>
                  <input type="text" value={name} onChange={e=>setName(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mt-1" placeholder="Amara Okonkwo" required />
                </div>
              )}
              <div>
                <label className="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" value={email} onChange={e=>setEmail(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mt-1" placeholder="you@example.com" required />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} className="w-full border border-gray-200 rounded-xl px-4 py-3 mt-1" placeholder="••••••••" required />
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl font-medium hover:bg-blue-700 transition">
                {type === 'login' ? 'Log in' : 'Create account'}
              </button>
            </form>
            <p className="text-sm text-gray-500 mt-4 text-center">
              {type === 'login' ? "Don't have an account? " : "Already registered? "}
              <button onClick={() => setView(type === 'login' ? 'register' : 'login')} className="text-blue-600 hover:underline">
                {type === 'login' ? 'Sign up' : 'Log in'}
              </button>
            </p>
          </div>
        );
      };

      // Customer Dashboard
      const CustomerDashboard = () => {
        const { currentUser, getUserShipments, addShipment } = useApp();
        const [shipments, setShipmentsState] = useState([]);
        const [newShipment, setNewShipment] = useState({ from: '', to: '', cost: '', status: 'pending' });

        useEffect(() => {
          if (currentUser) {
            const userShip = getUserShipments(currentUser.id);
            setShipmentsState(userShip);
          }
        }, [currentUser]);

        const handleAddShipment = (e) => {
          e.preventDefault();
          if (!newShipment.from || !newShipment.to || !newShipment.cost) return;
          const shipment = {
            userId: currentUser.id,
            status: 'in transit',
            from: newShipment.from,
            to: newShipment.to,
            date: new Date().toISOString().split('T')[0],
            cost: parseFloat(newShipment.cost),
          };
          addShipment(shipment);
          setShipmentsState([...shipments, shipment]);
          setNewShipment({ from: '', to: '', cost: '', status: 'pending' });
        };

        return (
          <div className="max-w-5xl mx-auto px-4 py-8">
            <h2 className="text-3xl font-bold text-gray-800">👋 Welcome, {currentUser?.name}</h2>
            <p className="text-gray-500 mb-6">Your shipping dashboard</p>

            <div className="grid md:grid-cols-2 gap-6">
              {/* Shipment history */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-semibold text-gray-700 flex items-center gap-2"><i className="fas fa-box text-blue-500"></i> Recent shipments</h3>
                {shipments.length === 0 ? (
                  <p className="text-gray-400 text-sm mt-3">No shipments yet. Start shipping!</p>
                ) : (
                  <ul className="mt-3 space-y-3">
                    {shipments.map((s, idx) => (
                      <li key={idx} className="border-b border-gray-50 pb-2 flex justify-between items-center">
                        <div>
                          <span className="font-medium text-gray-800">{s.from} → {s.to}</span>
                          <span className="text-xs text-gray-400 ml-2">{s.date}</span>
                          <span className={`ml-3 text-xs px-2 py-0.5 rounded-full ${s.status === 'delivered' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}`}>{s.status}</span>
                        </div>
                        <span className="text-sm font-medium">₦{s.cost.toLocaleString()}</span>
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              {/* New shipment form */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-semibold text-gray-700 flex items-center gap-2"><i className="fas fa-plus-circle text-blue-500"></i> Book new shipment</h3>
                <form onSubmit={handleAddShipment} className="mt-3 space-y-3">
                  <input type="text" value={newShipment.from} onChange={e=>setNewShipment({...newShipment, from:e.target.value})} placeholder="From (city)" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" required />
                  <input type="text" value={newShipment.to} onChange={e=>setNewShipment({...newShipment, to:e.target.value})} placeholder="To (city/country)" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" required />
                  <input type="number" value={newShipment.cost} onChange={e=>setNewShipment({...newShipment, cost:e.target.value})} placeholder="Estimated cost (₦)" className="w-full border border-gray-200 rounded-xl px-4 py-2 text-sm" required />
                  <button type="submit" className="w-full bg-blue-600 text-white py-2 rounded-xl font-medium hover:bg-blue-700">Book shipment</button>
                </form>
                <p className="text-xs text-gray-400 mt-2"><i className="fas fa-shield-alt text-blue-400"></i> “We break it, we pay it” protection included.</p>
              </div>
            </div>

            {/* Quick stats */}
            <div className="mt-6 grid grid-cols-3 gap-4 bg-white p-4 rounded-2xl border border-gray-100">
              <div><span className="text-xs text-gray-400">Total shipments</span><div className="text-xl font-bold">{shipments.length}</div></div>
              <div><span className="text-xs text-gray-400">Delivered</span><div className="text-xl font-bold">{shipments.filter(s=>s.status==='delivered').length}</div></div>
              <div><span className="text-xs text-gray-400">In transit</span><div className="text-xl font-bold">{shipments.filter(s=>s.status==='in transit').length}</div></div>
            </div>
          </div>
        );
      };

      // Admin Dashboard
      const AdminDashboard = () => {
        const { testimonials, addTestimonial, deleteTestimonial, users, shipments } = useApp();
        const [newTest, setNewTest] = useState({ author: '', role: '', text: '', rating: 5 });

        const handleAdd = (e) => {
          e.preventDefault();
          if (!newTest.author || !newTest.text) return;
          addTestimonial(newTest);
          setNewTest({ author: '', role: '', text: '', rating: 5 });
        };

        return (
          <div className="max-w-6xl mx-auto px-4 py-8">
            <h2 className="text-3xl font-bold text-gray-800">⚙️ Admin Dashboard</h2>
            <p className="text-gray-500 mb-6">Manage testimonials, view platform metrics</p>

            <div className="grid md:grid-cols-2 gap-8">
              {/* Testimonial manager */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-quote-right text-blue-500"></i> Testimonials</h3>
                <ul className="mt-3 space-y-3 max-h-60 overflow-y-auto">
                  {testimonials.map(t => (
                    <li key={t.id} className="border-b border-gray-50 pb-2 flex justify-between items-start">
                      <div><span className="font-medium">{t.author}</span> <span className="text-xs text-gray-400">{t.role}</span><p className="text-sm text-gray-600">“{t.text}”</p></div>
                      <button onClick={()=>deleteTestimonial(t.id)} className="text-red-400 hover:text-red-600 text-sm"><i className="fas fa-trash"></i></button>
                    </li>
                  ))}
                </ul>
                <form onSubmit={handleAdd} className="mt-4 space-y-2">
                  <input type="text" value={newTest.author} onChange={e=>setNewTest({...newTest, author:e.target.value})} placeholder="Author name" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                  <input type="text" value={newTest.role} onChange={e=>setNewTest({...newTest, role:e.target.value})} placeholder="Role (e.g. Founder)" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" />
                  <textarea value={newTest.text} onChange={e=>setNewTest({...newTest, text:e.target.value})} placeholder="Testimonial text" className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" rows="2" />
                  <div className="flex items-center gap-2">
                    <span className="text-sm">Rating:</span>
                    <select value={newTest.rating} onChange={e=>setNewTest({...newTest, rating:parseInt(e.target.value)})} className="border border-gray-200 rounded-lg px-2 py-1">
                      {[1,2,3,4,5].map(r=><option key={r}>{r}</option>)}
                    </select>
                  </div>
                  <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-blue-700">Add testimonial</button>
                </form>
              </div>

              {/* Platform metrics / user list */}
              <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 className="font-semibold flex items-center gap-2"><i className="fas fa-chart-simple text-blue-500"></i> Platform snapshot</h3>
                <div className="grid grid-cols-2 gap-4 mt-4">
                  <div><span className="text-xs text-gray-400">Total users</span><div className="text-2xl font-bold">{users.length}</div></div>
                  <div><span className="text-xs text-gray-400">Total shipments</span><div className="text-2xl font-bold">{shipments.length}</div></div>
                </div>
                <div className="mt-4">
                  <h4 className="text-sm font-medium text-gray-700">Registered users</h4>
                  <ul className="mt-2 text-sm space-y-1 max-h-40 overflow-y-auto">
                    {users.map(u => <li key={u.id} className="border-b border-gray-50 py-1 flex justify-between"><span>{u.name} ({u.email})</span><span className="text-xs bg-gray-100 px-2 rounded-full">{u.role}</span></li>)}
                  </ul>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // Main App Router
      const App = () => {
        const { isAuthenticated, currentUser } = useApp();
        const [view, setView] = useState('home'); // home | login | register | dashboard

        useEffect(() => {
          if (isAuthenticated) {
            setView('dashboard');
          } else {
            setView('home');
          }
        }, [isAuthenticated]);

        const renderView = () => {
          if (!isAuthenticated) {
            if (view === 'login') return <AuthForm type="login" setView={setView} />;
            if (view === 'register') return <AuthForm type="register" setView={setView} />;
            return <Home setView={setView} />;
          } else {
            // authenticated
            if (currentUser?.role === 'admin') return <AdminDashboard />;
            return <CustomerDashboard />;
          }
        };

        return (
          <div className="min-h-screen bg-gray-50/50">
            <NavBar />
            <main className="pt-4 pb-12">
              {renderView()}
            </main>
            <footer className="text-center text-xs text-gray-400 py-6 border-t border-gray-200 mt-8">
              EasyShip · Ship Smarter. Grow Faster. · Capstone 2026
            </footer>
          </div>
        );
      };

      // Root
      const Root = () => (
        <AppProvider>
          <App />
        </AppProvider>
      );

      ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
    </script>
  </body>
</html>
